# WHAT: MetalLB operator - on bare metal there's no cloud LB, so MetalLB provides the
#       LoadBalancer VIPs that RHOSO's OpenStackControlPlane uses for the public/internal
#       Keystone/Horizon/etc endpoints (external endpoint access).
# VERIFY: oc get pods -n metallb-system
apiVersion: v1
kind: Namespace
metadata:
  name: metallb-system
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: metallb-operator
  namespace: metallb-system
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: metallb-operator
  namespace: metallb-system
spec:
  channel: stable
  name: metallb-operator
  source: rhoso-mirror-catalog
  sourceNamespace: openshift-marketplace
  installPlanApproval: Manual # CHANGE-of-behavior: was Automatic - see docs/troubleshooting.md #11
---
apiVersion: metallb.io/v1beta1
kind: MetalLB
metadata:
  name: metallb
  namespace: metallb-system
