# WHAT: NMState operator - manages host network config declaratively via NodeNetworkConfigurationPolicy
#       (NNCP). RHOSO needs isolated VLANs/interfaces on OCP nodes for InternalAPI/Storage/Tenant
#       networks, which NMState provisions.
# VERIFY: oc get csv -n openshift-nmstate
#         oc get pods -n openshift-nmstate
apiVersion: v1
kind: Namespace
metadata:
  name: openshift-nmstate
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: openshift-nmstate
  namespace: openshift-nmstate
spec:
  targetNamespaces:
    - openshift-nmstate
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: kubernetes-nmstate-operator
  namespace: openshift-nmstate
spec:
  channel: stable
  name: kubernetes-nmstate-operator
  source: rhoso-mirror-catalog
  sourceNamespace: openshift-marketplace
  installPlanApproval: Manual # CHANGE-of-behavior: was Automatic - see docs/troubleshooting.md #11
---
apiVersion: nmstate.io/v1
kind: NMState
metadata:
  name: nmstate
