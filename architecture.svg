<svg width="100%" viewBox="0 0 680 740" role="img" xmlns="http://www.w3.org/2000/svg">
<title>RHOSO 18.0 on OpenShift -- POC architecture with hardware requirements</title>
<desc>Pre-provisioning infrastructure (Satellite, mirror registry, external Ceph) on the right feeds a main flow on the left: Terraform-provisioned master and worker nodes run an OpenShift cluster containing the RHOSO control plane, which orchestrates an external RHEL Compute node. Each box shows its vCPU/RAM/disk requirement. External Ceph also serves the Compute node directly.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
  text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;fill:#2C2C2A;}
  .t{font-size:14px;} .ts{font-size:12px;} .th{font-size:14px;font-weight:600;} .tm{font-size:11.5px;font-weight:600;}
  .coral{fill:#FAECE7;stroke:#D85A30;stroke-width:0.75;} .coral .th{fill:#712B13;} .coral .ts{fill:#993C1D;} .coral .tm{fill:#993C1D;}
  .gray{fill:#F1EFE8;stroke:#888780;stroke-width:0.75;} .gray .th{fill:#444441;} .gray .ts{fill:#5F5E5A;} .gray .tm{fill:#5F5E5A;}
  .teal{fill:#E1F5EE;stroke:#1D9E75;stroke-width:0.75;} .teal .th{fill:#085041;} .teal .ts{fill:#0F6E56;}
  .purple{fill:#EEEDFE;stroke:#7F77DD;stroke-width:0.75;} .purple .th{fill:#3C3489;} .purple .ts{fill:#534AB7;}
  .arr{stroke:#73726c;stroke-width:1.2;fill:none;}
  .lbl{fill:#5F5E5A;}
  @media (prefers-color-scheme: dark){
    text{fill:#E5E3D8;} .lbl{fill:#B4B2A9;}
    .coral{fill:#4A1B0C;stroke:#F0997B;} .coral .th{fill:#F5C4B3;} .coral .ts{fill:#F0997B;} .coral .tm{fill:#F0997B;}
    .gray{fill:#2C2C2A;stroke:#888780;} .gray .th{fill:#D3D1C7;} .gray .ts{fill:#B4B2A9;} .gray .tm{fill:#B4B2A9;}
    .teal{fill:#04342C;stroke:#5DCAA5;} .teal .th{fill:#9FE1CB;} .teal .ts{fill:#5DCAA5;}
    .purple{fill:#26215C;stroke:#AFA9EC;} .purple .th{fill:#CECBF6;} .purple .ts{fill:#AFA9EC;}
    .arr{stroke:#9c9a92;}
  }
</style>
</defs>

<text class="ts lbl" x="40" y="26">Main flow</text>
<text class="ts lbl" x="460" y="26">Pre-provisioning infra (phase -1)</text>

<g class="gray"><rect x="40" y="40" width="175" height="60" rx="8"/>
<text class="th" x="127" y="58" text-anchor="middle" dominant-baseline="central">3x Master</text>
<text class="tm" x="127" y="78" text-anchor="middle" dominant-baseline="central">8vCPU . 32GB . 120GB</text></g>
<g class="gray"><rect x="225" y="40" width="175" height="60" rx="8"/>
<text class="th" x="312" y="58" text-anchor="middle" dominant-baseline="central">3x Worker</text>
<text class="tm" x="312" y="78" text-anchor="middle" dominant-baseline="central">16vCPU . 64GB . 250GB</text></g>
<text class="ts lbl" x="40" y="118">redfish . libvirt . vsphere (Terraform)</text>
<text class="ts lbl" x="40" y="134">1 worker = Compute node (+ nested virt)</text>

<line class="arr" x1="220" y1="100" x2="220" y2="162" marker-end="url(#arrow)"/>

<g class="teal"><rect x="40" y="166" width="360" height="240" rx="14"/>
<text class="th" x="64" y="194">OpenShift 4.18 cluster</text>
<text class="ts" x="64" y="214">cert-manager, NMState, MetalLB, ODF</text></g>
<g class="purple"><rect x="70" y="320" width="300" height="65" rx="10"/>
<text class="th" x="220" y="345" text-anchor="middle" dominant-baseline="central">RHOSO control plane</text>
<text class="ts" x="220" y="367" text-anchor="middle" dominant-baseline="central">~20 OpenStack services</text></g>

<line class="arr" x1="220" y1="406" x2="220" y2="462" marker-end="url(#arrow)"/>

<g class="coral"><rect x="40" y="466" width="360" height="66" rx="8"/>
<text class="th" x="220" y="489" text-anchor="middle" dominant-baseline="central">RHEL 9.4 Compute node</text>
<text class="ts" x="220" y="512" text-anchor="middle" dominant-baseline="central">Nova, OVN, libvirt, Ceph client</text></g>
<text class="ts lbl" x="40" y="550">= Worker spec above, + nested virt (VT-x/AMD-V)</text>

<g class="coral"><rect x="460" y="196" width="180" height="78" rx="8"/>
<text class="th" x="550" y="217" text-anchor="middle" dominant-baseline="central">Mirror registry</text>
<text class="ts" x="550" y="236" text-anchor="middle" dominant-baseline="central">OCI images (Quay)</text>
<text class="tm" x="550" y="256" text-anchor="middle" dominant-baseline="central">2vCPU/8GB/300-500GB</text></g>
<path class="arr" d="M460 235 L400 235" marker-end="url(#arrow)"/>

<g class="coral"><rect x="460" y="326" width="180" height="78" rx="8"/>
<text class="th" x="550" y="347" text-anchor="middle" dominant-baseline="central">External Ceph</text>
<text class="ts" x="550" y="366" text-anchor="middle" dominant-baseline="central">RBD storage backend</text>
<text class="tm" x="550" y="386" text-anchor="middle" dominant-baseline="central">8vCPU . 32GB . 200GB+</text></g>
<path class="arr" d="M460 365 L400 365" marker-end="url(#arrow)"/>
<path class="arr" d="M640 365 L662 365 L662 600 L350 600 L350 534" marker-end="url(#arrow)"/>

<g class="coral"><rect x="460" y="474" width="180" height="78" rx="8"/>
<text class="th" x="550" y="495" text-anchor="middle" dominant-baseline="central">Satellite</text>
<text class="ts" x="550" y="514" text-anchor="middle" dominant-baseline="central">RPM content + keys</text>
<text class="tm" x="550" y="534" text-anchor="middle" dominant-baseline="central">4vCPU . 32GB . 300GB</text></g>
<path class="arr" d="M460 513 L400 513" marker-end="url(#arrow)"/>

<text class="th" x="40" y="632">Legend</text>
<rect class="coral" x="40" y="646" width="14" height="14" rx="3"/><text class="ts" x="62" y="657">External to the cluster (infra + Compute node)</text>
<rect class="gray" x="40" y="669" width="14" height="14" rx="3"/><text class="ts" x="62" y="680">Node layer (Terraform-provisioned)</text>
<rect class="teal" x="40" y="692" width="14" height="14" rx="3"/><text class="ts" x="62" y="703">OpenShift platform operators</text>
<rect class="purple" x="40" y="715" width="14" height="14" rx="3"/><text class="ts" x="62" y="726">RHOSO OpenStack services</text>
</svg>
